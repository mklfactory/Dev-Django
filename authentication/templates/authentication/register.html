{% extends 'base.html' %}
{% block title %}Inscription - LITRevu{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-6 sm:p-8 mt-6 sm:mt-10">
    <h1 class="text-2xl font-bold mb-6 text-center">Créer un compte</h1>

    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-4">
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <div class="flex gap-3">
            <a href="{% url 'home' %}"
               class="flex-1 text-center border border-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-50 font-semibold">
                Retourner
            </a>
            <button type="submit"
                    class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 font-semibold">
                S'inscrire
            </button>
        </div>
    </form>
</div>
{% endblock %}
