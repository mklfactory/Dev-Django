{% extends 'base.html' %}
{% block title %}Connexion - LITRevu{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-8 mt-10">
    <h1 class="text-2xl font-bold mb-6 text-center">Connexion</h1>
    
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-semibold">
            Se connecter
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
        Pas encore de compte ?
        <a href="{% url 'register' %}" class="text-blue-600 hover:underline">S'inscrire</a>
    </p>
</div>
{% endblock %}
