<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LITRevu{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow p-4 flex justify-between items-center">
    <a href="{% url 'home' %}" class="font-bold text-xl text-blue-600">LITRevu</a>
    <div>
        {% if user.is_authenticated %}
            <span class="text-gray-600 mr-4">👤 {{ user.username }}</span>
            <a href="{% url 'feed' %}" class="text-gray-600 hover:text-blue-600 mr-4">Feed</a>
            <a href="{% url 'ticket_list' %}" class="text-gray-600 hover:text-blue-600 mr-4">Tickets</a>
            <a href="{% url 'follows' %}" class="text-gray-600 hover:text-blue-600 mr-4">Abonnements</a>
            <a href="{% url 'logout' %}" class="text-red-500 hover:underline">Déconnexion</a>
        {% else %}
            <a href="{% url 'login' %}" class="text-blue-600 hover:underline mr-4">Connexion</a>
            <a href="{% url 'register' %}" class="text-green-600 hover:underline">Inscription</a>
        {% endif %}
    </div>
</nav>

    <main class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
