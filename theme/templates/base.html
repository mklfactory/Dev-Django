<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LITRevu{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
    <style>
        /* Django rend les RadioSelect en <ul> nues (ex: la note d'une critique) */
        form ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 0;
        }
        form ul li label {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:bg-white focus:text-blue-700 focus:px-4 focus:py-2 focus:rounded-lg focus:shadow">
        Aller au contenu principal
    </a>
    <nav class="bg-white shadow px-6 py-2 flex justify-between items-center">
        <a href="{% url 'home' %}">
            <img src="{% static 'images/logo.png' %}" alt="LITRevu" class="max-h-[50px] w-auto">
        </a>
        <div class="flex items-center gap-5">
            {% if user.is_authenticated %}
                <a href="{% url 'feed' %}" class="text-gray-600 hover:text-blue-600 hover:underline font-medium">Flux</a>
                <a href="{% url 'my_posts' %}" class="text-gray-600 hover:text-blue-600 hover:underline font-medium">Posts</a>
                <a href="{% url 'follows' %}" class="text-gray-600 hover:text-blue-600 hover:underline font-medium">Abonnements</a>
                <a href="{% url 'logout' %}" class="text-red-500 hover:underline font-medium">Se déconnecter</a>
            {% else %}
                <a href="{% url 'home' %}" class="text-blue-600 hover:underline font-medium">Connexion</a>
                <a href="{% url 'register' %}" class="text-green-600 hover:underline font-medium">Inscription</a>
            {% endif %}
        </div>
    </nav>

    <main id="main-content" class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
